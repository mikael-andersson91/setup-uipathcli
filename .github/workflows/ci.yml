name: Continuous Integration

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-javascript:
    name: JavaScript Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        id: setup-node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install Dependencies
        id: npm-ci
        run: npm ci

      - name: Check Format
        id: npm-format-check
        run: npm run format:check

      - name: Lint
        id: npm-lint
        run: npm run lint

      - name: Test
        id: npm-ci-test
        run: npm run ci-test

  test-action:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    name: GitHub Actions Test
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6

      - name: Test Setup uipathcli action
        id: test-action
        uses: ./
        with:
          client-id: ${{ secrets.CLIENT_ID }}
          client-secret: ${{ secrets.CLIENT_SECRET }}
          organization: myorganization
          tenant: MyTenant

      - name: Run Sample Command
        id: run-command
        run: |
          echo "Testing uipathcli installation and configuration"
          echo "UIPATH_URI: $UIPATH_URI"
          echo "UIPATH_TENANT: $UIPATH_TENANT"
          echo "UIPATH_ORGANIZATION: $UIPATH_ORGANIZATION"
          uipath orchestrator --help
